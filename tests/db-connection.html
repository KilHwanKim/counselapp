<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>DB 연결 테스트</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f5f6f7; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-lg shadow-md p-8 max-w-md w-full">
        <h1 class="text-xl font-bold text-gray-800 mb-2">DB 연결 테스트</h1>
        <p class="text-sm text-gray-500 mb-6">Postgres(Vercel/Neon) 연결 상태를 확인합니다.</p>
        <button
            id="testBtn"
            class="w-full bg-[#00c73c] hover:bg-[#00a832] text-white font-medium py-3 px-4 rounded-md transition"
        >
            DB 연결 테스트
        </button>
        <div id="result" class="mt-6 hidden"></div>
    </div>
    <script>
        const btn = document.getElementById('testBtn');
        const resultEl = document.getElementById('result');
        btn.addEventListener('click', async () => {
            btn.disabled = true;
            resultEl.classList.remove('hidden');
            resultEl.innerHTML = '<p class="text-gray-500">연결 중...</p>';
            resultEl.className = 'mt-6 p-4 rounded-md bg-gray-100 text-gray-700';
            try {
                const res = await fetch('/api/db-test');
                const data = await res.json();
                if (data.ok) {
                    resultEl.className = 'mt-6 p-4 rounded-md bg-green-50 text-green-800';
                    resultEl.innerHTML = '<p class="font-medium">연결 성공</p><p class="text-sm mt-1">' + (data.message || 'Connected') + (data.time ? ' — ' + data.time : '') + '</p>';
                } else {
                    resultEl.className = 'mt-6 p-4 rounded-md bg-red-50 text-red-800';
                    resultEl.innerHTML = '<p class="font-medium">연결 실패</p><p class="text-sm mt-1">' + (data.error || res.statusText) + '</p>';
                }
            } catch (err) {
                resultEl.className = 'mt-6 p-4 rounded-md bg-red-50 text-red-800';
                resultEl.innerHTML = '<p class="font-medium">오류</p><p class="text-sm mt-1">' + err.message + '</p>';
            }
            btn.disabled = false;
        });
    </script>
</body>
</html>
